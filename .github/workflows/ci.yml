name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore / build / test (.NET)
        run: |
          dotnet restore AgriculturalCrm.sln
          dotnet build AgriculturalCrm.sln --configuration Release --no-restore
          dotnet test AgriculturalCrm.sln --configuration Release --no-build --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
