trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

steps:
  - task: UseDotNet@2
    displayName: 'Instalar SDK .NET 8'
    inputs:
      packageType: 'sdk'
      version: '8.0.x'
      installationPath: $(Agent.ToolsDirectory)/dotnet

  - script: dotnet restore AgriculturalCrm.sln
    displayName: 'Restaurar dependencias'

  - script: dotnet build AgriculturalCrm.sln --configuration $(buildConfiguration) --no-restore
    displayName: 'Compilar backend'

  - script: dotnet test AgriculturalCrm.sln --configuration $(buildConfiguration) --no-build --verbosity normal
    displayName: 'Ejecutar pruebas unitarias'
